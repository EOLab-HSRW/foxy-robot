/**/ekf_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2

    # Force z, roll, pitch and their derivatives to zero.
    two_d_mode: true

    transform_time_offset: 0.0
    transform_timeout: 0.0

    print_diagnostics: true
    debug: false

    publish_acceleration: false
    publish_tf: true

    # Frame names and topic names are injected by single.launch.py because
    # they depend on robot_name:
    #
    #   odom_frame
    #   base_link_frame
    #   world_frame
    #   odom0
    #   imu0

    # State vector order:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az

    # Wheel odometry:
    #
    # Fuse:
    #   vx   - encoder-derived forward velocity
    #   vy   - zero lateral velocity/nonholonomic constraint
    #   vyaw - encoder-derived angular velocity
    #
    # Do not fuse wheel-integrated position or yaw pose because those values
    # are calculated from the same encoder velocities.
    odom0_config:
      [false, false, false,
       false, false, false,
       true,  true,  false,
       false, false, true,
       false, false, false]

    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # Filtered IMU:
    #
    # Initially fuse only angular_velocity.z.
    #
    # Do not fuse Madgwick yaw yet: without a magnetometer, that yaw is
    # gyro-integrated and is not an independent absolute heading reference.
    imu0_config:
      [false, false, false,
       false, false, false,
       false, false, false,
       false, false, true,
       false, false, false]

    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false

    # Linear acceleration is not selected above, so gravity removal is not
    # required by this EKF configuration.
    imu0_remove_gravitational_acceleration: false
